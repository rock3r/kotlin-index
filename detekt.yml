# Detekt configuration
# Builds upon the default config (buildUponDefaultConfig = true in build.gradle.kts)
# Compose-specific detekt rule plugins are intentionally omitted.

style:
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  WildcardImport:
    active: true
  ThrowsCount:
    active: false
  ReturnCount:
    max: 8

complexity:
  LongParameterList:
    active: false
  ComplexCondition:
    allowedConditions: 5
  CyclomaticComplexMethod:
    allowedComplexity: 15
  LongMethod:
    active: true
    allowedLines: 100
  TooManyFunctions:
    allowedFunctionsPerFile: 15
    allowedFunctionsPerClass: 15
    allowedFunctionsPerObject: 15
    allowedFunctionsPerInterface: 15
  LargeClass:
    excludes: ["**/test/**"]
  NestedBlockDepth:
    allowedDepth: 5

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Test"
