name: native D4 host validation

on:
  push:
    branches: [feat/native-cli-d4-aot-verification]
  workflow_dispatch:

jobs:
  verify:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            task: verifyNativeDistributionLinuxX64
          - target: windows-x64
            runner: windows-latest
            task: verifyNativeDistributionWindowsX64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Disable fixture commit signing
        shell: bash
        run: git config --global commit.gpgSign false
      - name: Verify native distribution
        shell: bash
        run: ./gradlew ${{ matrix.task }} --no-daemon
      - name: Upload D4 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-d4-${{ matrix.target }}
          path: build/reports/native-distributions/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 3
