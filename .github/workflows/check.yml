name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Run JVM, publication, consumer, and R8 checks
        run: ./gradlew check verifyMavenPublication verifyShrunkCli --no-daemon

  native-linux-x64:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Read immutable native input pins
        id: pins
        shell: bash
        run: .github/scripts/native-archive-cache.sh emit-pins linux-x64 >> "$GITHUB_OUTPUT"
      - name: Restore verified JBR and Roast archives
        uses: actions/cache@v4
        with:
          path: ${{ steps.pins.outputs.cache_path }}
          key: native-inputs-Linux-linux-x64-${{ steps.pins.outputs.cache_key }}
      - name: Verify Linux x64 native distribution
        shell: bash
        run: |
          mkdir -p build/ci-logs/linux-x64
          set -o pipefail
          .github/scripts/native-archive-cache.sh run linux-x64 .native-download-cache -- \
            ./gradlew verifyNativeDistributionLinuxX64 sha256NativeDistributionLinuxX64 \
              --no-daemon --console=plain 2>&1 | \
            tee build/ci-logs/linux-x64/verification.log
      - name: Smoke oldest supported Linux baseline (ubuntu:22.04 / glibc 2.35)
        run: scripts/smoke-linux-baseline.sh build/distributions/*.zip ubuntu:22.04
      - name: Upload Linux distribution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: |
            build/distributions/*.zip
            build/distributions/*.sha256
            build/ci-logs
            build/reports/native-distributions
            build/test-results/verifyNativeDistributionLinuxX64
          if-no-files-found: warn
          retention-days: 7
