name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  readiness:
    name: Validate release tag and native legal gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      native_release: ${{ steps.native.outputs.enabled }}
    steps:
      - uses: actions/checkout@v6
      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be SemVer-shaped: v<major>.<minor>.<patch>[-prerelease][+metadata]" >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Evaluate native redistribution approval
        id: native
        env:
          NATIVE_RELEASE_APPROVED: ${{ vars.NATIVE_RELEASE_APPROVED }}
          VERIFY_PUBLIC_KEY_FINGERPRINT: "true"
        shell: bash
        run: |
          approval="$(jq -r '.approvalStatus' release/native-redistribution-manifest.json)"
          if .github/scripts/verify-native-release-readiness.sh; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Native draft disabled: approvalStatus=$approval, repository approval=$NATIVE_RELEASE_APPROVED"
          fi

  publish:
    name: Verify and upload to Maven Central for manual promotion
    needs: readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Run release checks and generate dependency inventory
        run: |
          ./gradlew \
            check \
            verifyMavenPublication \
            verifyShrunkCli \
            generateBundledDependencyInventory \
            -PVERSION_NAME="${{ needs.readiness.outputs.version }}"
      - name: Upload dependency inventory
        uses: actions/upload-artifact@v4
        with:
          name: native-dependency-inventory
          path: build/reports/release/bundled-dependencies.txt
          if-no-files-found: error
          retention-days: 7
      - name: Publish signed artifacts to Sonatype Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          test -n "$ORG_GRADLE_PROJECT_mavenCentralUsername"
          test -n "$ORG_GRADLE_PROJECT_mavenCentralPassword"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKey"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKeyPassword"
          ./gradlew publishToMavenCentral \
            -PVERSION_NAME="${{ needs.readiness.outputs.version }}"

  native-distributions:
    name: Build final native release candidates
    needs: [readiness, publish]
    if: needs.readiness.outputs.native_release == 'true'
    uses: ./.github/workflows/native-distributions.yml
    with:
      version: ${{ needs.readiness.outputs.version }}
      release: true
    secrets: inherit

  draft-release:
    name: Create draft GitHub release
    needs: [readiness, publish, native-distributions]
    if: >-
      always() &&
      needs.readiness.outputs.native_release == 'true' &&
      needs.publish.result == 'success' &&
      needs.native-distributions.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download native release candidates
        uses: actions/download-artifact@v5
        with:
          pattern: native-*
          path: downloaded-artifacts
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find downloaded-artifacts -type f \
            \( -name '*.zip' -o -name '*.sha256' -o -name 'bundled-dependencies.txt' \) \
            -exec cp {} release-assets/ \;
          cp release/native-redistribution-manifest.json release-assets/
          test "$(find release-assets -maxdepth 1 -name '*.zip' | wc -l)" -eq 3
          test "$(find release-assets -maxdepth 1 -name '*.sha256' | wc -l)" -eq 3
          test -f release-assets/bundled-dependencies.txt
      - name: Generate signed aggregate provenance
        env:
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          .github/scripts/generate-release-provenance.sh release-assets release-assets
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --draft \
            --verify-tag \
            --title "Indexino ${{ needs.readiness.outputs.version }}" \
            --notes "Native ZIPs are signed/provenance-bound release candidates. Maven Central promotion remains manual."
